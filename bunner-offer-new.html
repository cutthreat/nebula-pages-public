<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Banner Offer — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:"Manrope",sans-serif;background:#f3f0f8}
    .frame{width:min(1280px,100vw);height:855px;margin:0 auto;background:linear-gradient(180deg,#f6f3fb 0%,#ece6f8 100%);position:relative;overflow:hidden}
    .backdrop{position:absolute;inset:0;background:rgba(43,26,82,.58)}
    .modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:292px;background:#fff;border-radius:26px;box-shadow:0 24px 64px rgba(32,16,77,.22);padding:18px 18px 16px;text-align:center}
    .modal__close{position:absolute;top:12px;right:12px;width:20px;height:20px;border:0;background:transparent}
    .modal__close:before,.modal__close:after{content:"";position:absolute;left:9px;top:1px;width:1.5px;height:18px;background:#8d6df0;border-radius:4px}
    .modal__close:before{transform:rotate(45deg)}
    .modal__close:after{transform:rotate(-45deg)}
    .modal__img{width:112px;height:auto;margin:0 auto 8px}
    .modal__title{margin:0 auto 10px;max-width:210px;color:#6d45ea;font-size:24px;line-height:1.04;font-weight:600;letter-spacing:-.03em}
    .modal__list{margin:0 auto 14px;padding:0;list-style:none;max-width:210px;text-align:left;display:grid;gap:7px;color:#2c2733;font-size:12px;line-height:1.45}
    .modal__list li{position:relative;padding-left:14px}
    .modal__list li:before{content:"";position:absolute;left:0;top:.42em;width:7px;height:7px;border-radius:50%;background:#ffb84d}
    .btn{display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 18px;border-radius:12px;background:#734ff0;color:#fff;text-decoration:none;font-weight:700;box-shadow:0 12px 28px rgba(115,79,240,.24)}
    .top{position:absolute;left:0;top:0;right:0;height:28px;background:linear-gradient(90deg,#7b55ff 0%,#a07eff 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;letter-spacing:.02em}
    .top span{background:#ffcf79;color:#5a2e00;padding:2px 8px;border-radius:999px;margin-left:8px}
    @media (max-width:1200px){.frame{height:740px}.modal{width:286px}}
    @media (max-width:960px){.frame{height:740px}.modal{width:270px}}
    @media (max-width:640px){.frame{height:740px}.modal{width:248px}.modal__title{font-size:20px}}
    @media (max-width:480px){.frame{height:740px}.top{font-size:10px}}
    @media (max-width:320px){.frame{height:740px}.modal{width:220px}}
  </style>
</head>
<body>
  <div class="frame">
    <div class="backdrop"></div>
    <div class="top">3 Minutes FREE - 80% OFF For New Customers <span>Try now</span></div>
    <div class="modal">
      <button class="modal__close" aria-label="Close"></button>
      <img class="modal__img" src="img/prn-tailored-orb-v2.png" alt="Offer" />
      <div class="modal__title">Get your first psychic reading for FREE</div>
      <ul class="modal__list">
        <li>Conditions depending on the selected offer</li>
        <li>Service available for new users</li>
        <li>No credit card required</li>
      </ul>
      <a class="btn" href="#">Start Now</a>
    </div>
  </div>
</body>
</html>
