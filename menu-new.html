<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menu — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:"Manrope",sans-serif;background:#f3f0f8}
    .frame{width:min(1280px,100vw);height:855px;margin:0 auto;background:linear-gradient(180deg,#f6f3fb 0%,#ece6f8 100%);position:relative;overflow:hidden}
    .menu{position:absolute;inset:52px 40px 42px;background:#f7f3fb;border-radius:28px;box-shadow:0 24px 70px rgba(92,62,180,.18);overflow:hidden}
    .menu__hero{position:absolute;inset:0;background:linear-gradient(90deg,rgba(113,77,240,.16),rgba(113,77,240,0) 58%),linear-gradient(180deg,#fff 0%,#f4ecff 100%)}
    .menu__layout{position:relative;display:grid;grid-template-columns:1.16fr .84fr;height:100%}
    .menu__content{padding:34px 36px}
    .menu__top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .menu__logo{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:800;letter-spacing:.08em}
    .menu__dot{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#c8adff,#7a58ff 74%)}
    .menu__close{width:24px;height:24px;border:0;background:transparent;position:relative}
    .menu__close:before,.menu__close:after{content:"";position:absolute;left:11px;top:1px;width:1px;height:22px;background:#fff}
    .menu__close:before{transform:rotate(45deg)}
    .menu__close:after{transform:rotate(-45deg)}
    .menu__list{list-style:none;padding:0;margin:0;max-width:370px;display:grid;gap:2px}
    .menu__item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;color:#fff;border-bottom:1px solid rgba(255,255,255,.12);font-size:19px;line-height:1.37;text-shadow:0 1px 0 rgba(0,0,0,.08)}
    .menu__side{position:relative;background:rgba(255,255,255,.18);backdrop-filter:blur(1px)}
    .menu__side::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(38,20,75,.26) 0%,rgba(38,20,75,.44) 100%)}
    .menu__cards{position:absolute;inset:36px 28px 28px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;align-content:start}
    .menu__card{position:relative;border-radius:22px;overflow:hidden;min-height:156px;background:linear-gradient(180deg,#d9c8ff 0%,#9d79ff 100%);box-shadow:0 16px 36px rgba(72,39,153,.24)}
    .menu__card:nth-child(2){background:linear-gradient(180deg,#efd7bf 0%,#b6875b 100%)}
    .menu__card:nth-child(3){background:linear-gradient(180deg,#dcc6ff 0%,#b183ff 100%)}
    .menu__card:nth-child(4){background:linear-gradient(180deg,#f1d4b5 0%,#bd8d5d 100%)}
    .menu__card span{position:absolute;left:14px;bottom:12px;right:14px;color:#fff;font-size:13px;line-height:1.3}
    .menu__footer{position:absolute;left:36px;right:36px;bottom:26px;display:flex;align-items:center;justify-content:space-between;color:#fff;font-size:12px}
    .menu__footer .pill{padding:6px 10px;border:1px solid rgba(255,255,255,.28);border-radius:999px}
    @media (max-width:1200px){.frame{height:740px}.menu__item{font-size:18px}.menu__cards{grid-template-columns:repeat(2,minmax(0,1fr));}}
    @media (max-width:960px){.frame{height:740px}.menu{inset:20px}.menu__layout{grid-template-columns:1fr}.menu__side{display:none}.menu__content{padding:24px}}
    @media (max-width:640px){.frame{height:740px}.menu__item{font-size:16px}}
    @media (max-width:480px){.frame{height:740px}.menu__content{padding:18px}}
    @media (max-width:320px){.frame{height:740px}.menu__item{font-size:14px}}
  </style>
</head>
<body>
  <div class="frame">
    <div class="menu">
      <div class="menu__hero"></div>
      <div class="menu__layout">
        <div class="menu__content">
          <div class="menu__top">
            <div class="menu__logo"><span class="menu__dot"></span><span>NEURO</span></div>
            <button class="menu__close" aria-label="Close menu"></button>
          </div>
          <ul class="menu__list">
            <li class="menu__item"><span>Psychic Reading</span><span>›</span></li>
            <li class="menu__item"><span>Psychics</span><span>›</span></li>
            <li class="menu__item"><span>Topic</span><span>›</span></li>
            <li class="menu__item"><span>Zodiac Signs</span><span>›</span></li>
            <li class="menu__item"><span>Charts</span><span>›</span></li>
            <li class="menu__item"><span>Articles</span><span>›</span></li>
          </ul>
          <div class="menu__footer"><span class="pill">Sign in</span><span>Eng</span><span class="pill">Try now</span></div>
        </div>
        <div class="menu__side">
          <div class="menu__cards">
            <div class="menu__card"><span>Recover relationships</span></div>
            <div class="menu__card"><span>Find yourself</span></div>
            <div class="menu__card"><span>Find your soulmate</span></div>
            <div class="menu__card"><span>Return your ex</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
