<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Button Get Started — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:"Manrope",sans-serif;background:#f3f0f8}
    .frame{width:min(222px,100vw);height:158px;margin:0 auto;background:linear-gradient(180deg,#f6f3fb 0%,#ece6f8 100%);display:flex;align-items:center;justify-content:center}
    .btn{display:inline-flex;align-items:center;justify-content:center;height:42px;padding:0 18px;border-radius:12px;background:#ffbf73;color:#6a3300;font-size:19px;font-weight:700;letter-spacing:0;text-transform:uppercase;box-shadow:0 12px 24px rgba(255,191,115,.24);text-decoration:none}
    .btn:hover{filter:brightness(.98)}
  </style>
</head>
<body>
  <div class="frame">
    <a class="btn" href="#">GET STARTED</a>
  </div>
</body>
</html>
