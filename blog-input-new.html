<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blog Input — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bootstrap.css" />
  <link rel="stylesheet" href="home.css" />
  <style>
    .page-article{padding:140px 0 88px;background:linear-gradient(180deg,#f7f5fb 0%,#f2eff8 100%)}
    .page-article__head{max-width:880px;margin:0 auto 34px}
    .page-article__kicker{display:inline-flex;padding:10px 16px;border-radius:999px;background:#fff;color:#6d45ea;border:1px solid rgba(109,69,234,.12);font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 10px 24px rgba(109,69,234,.06)}
    .page-article__title{margin:18px 0 12px;font-size:68px;line-height:.96;letter-spacing:-.04em;color:#171717}
    .page-article__lead{max-width:860px;font-size:20px;line-height:1.7;color:#3c3845}
    .blog-input{max-width:820px;margin:0 auto;background:#fff;border-radius:28px;border:1px solid rgba(109,69,234,.08);box-shadow:0 16px 40px rgba(86,57,175,.08);padding:26px}
    .blog-input__field{width:100%;height:54px;border-radius:14px;border:1px solid rgba(115,79,240,.18);padding:0 18px;font-size:16px;outline:none}
    .blog-input__field::placeholder{color:#9183b6}
    .blog-input__textarea{margin-top:14px;width:100%;min-height:180px;border-radius:18px;border:1px solid rgba(115,79,240,.18);padding:16px 18px;font-size:16px;outline:none;resize:vertical}
    .blog-input__actions{display:flex;gap:12px;justify-content:flex-end;margin-top:16px}
    .blog-input__hint{margin-top:14px;font-size:13px;color:#756b88;line-height:1.6}
    @media (max-width: 991.98px){.page-article{padding:120px 0 64px}.page-article__title{font-size:54px}.page-article__lead{font-size:18px}}
    @media (max-width: 767.98px){.page-article{padding:104px 0 52px}.page-article__head{margin-bottom:24px}.page-article__title{font-size:38px;line-height:1}.page-article__lead{font-size:16px;line-height:1.68}.blog-input{padding:18px;border-radius:22px}.blog-input__field{height:48px;font-size:15px}.blog-input__textarea{min-height:150px;font-size:15px}}
    @media (max-width: 390px){.page-article{padding:96px 0 44px}.page-article__kicker{font-size:12px;padding:8px 12px}.page-article__title{font-size:32px}.page-article__lead{font-size:15px}.blog-input{padding:16px;border-radius:20px}.blog-input__actions{flex-direction:column}.blog-input__actions .c-btn{width:100%}}
  </style>
</head>
<body class="home">
  <header class="site-header fixed-top">
    <div class="container">
      <div class="site-header__inner d-flex align-items-center justify-content-between">
        <a class="site-header__logo" href="home.html"><img src="img/logo.png" alt="logo neuro" width="142" height="30" /></a>
        <div class="site-header__actions"><a class="c-btn c-btn--ghost site-header__btn" href="login.html"><span>Log in</span><span class="c-btn__icon c-btn__icon--arrow"></span></a></div>
      </div>
    </div>
  </header>
  <main class="page-article">
    <div class="container">
      <div class="page-article__head">
        <div class="page-article__kicker">BLOG INPUT 1200+</div>
        <h1 class="page-article__title">Blog input</h1>
        <p class="page-article__lead">This shell represents the editor / input state for the blog surface. It is intentionally simple, focused, and responsive.</p>
      </div>
      <form class="blog-input">
        <input class="blog-input__field" type="text" placeholder="Article title" />
        <textarea class="blog-input__textarea" placeholder="Write the article content here..."></textarea>
        <div class="blog-input__actions">
          <a class="c-btn c-btn--ghost site-header__btn" href="blog-new.html"><span>Cancel</span><span class="c-btn__icon c-btn__icon--arrow"></span></a>
          <a class="c-btn c-btn--primary" href="blog-new.html">Save draft</a>
        </div>
        <div class="blog-input__hint">The layout stays readable at all widths and behaves like a content admin state, not a landing page.</div>
      </form>
    </div>
  </main>
</body>
</html>
