<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auth Login State — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="figma-auth.css" />
</head>
<body class="na-auth-page">
  <main class="na-auth-stage" aria-label="Login state">
    <div class="na-auth-page__shell">
      <a class="na-auth-page__brand" href="home.html"><span class="na-auth-page__brand-dot"></span><span>NEURO</span></a>
      <div class="na-auth-page__links"><a href="signup-step-1.html">Eng ▾</a><a href="signup-step-1.html">Sign up →</a></div>

      <aside class="na-auth-page__side"></aside>
      <section class="na-auth-page__panel">
        <form class="na-auth-form" action="home.html" method="get">
          <h1 class="na-auth-form__title">Log in</h1>
          <p class="na-auth-form__subtitle">Log in with your email and password to continue.</p>

          <div class="na-auth-field-wrap">
            <input class="na-auth-field" type="email" placeholder="Your email">
          </div>
          <div class="na-auth-field-wrap">
            <input class="na-auth-field" type="password" placeholder="Your password">
          </div>

          <div class="na-auth-checks">
            <label class="na-auth-check"><input type="checkbox" checked><span>Remember me on this device.</span></label>
          </div>

          <button class="na-auth-btn" type="submit">Login</button>
          <a class="na-auth-btn na-auth-btn--ghost" href="signup-step-1.html">Create account</a>
        </form>
      </section>
      <aside class="na-auth-page__side na-auth-page__side--right"></aside>
    </div>
  </main>
</body>
</html>
