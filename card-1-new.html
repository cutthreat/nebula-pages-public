<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Card 1 — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:"Manrope",sans-serif;background:#f3f0f8}
    .frame{width:min(330px,100vw);height:479px;margin:0 auto;background:linear-gradient(180deg,#f6f3fb 0%,#ece6f8 100%);display:flex;align-items:center;justify-content:center;padding:14px;box-sizing:border-box}
    .card{width:100%;height:100%;border-radius:18px;background:#fff;border:1px solid rgba(115,79,240,.12);box-shadow:0 16px 36px rgba(86,57,175,.08);padding:14px 14px 12px;box-sizing:border-box}
    .person{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(180deg,#cab8ff 0%,#8f6aff 100%)}
    .name{font-size:18px;font-weight:700}
    .role{font-size:11px;color:#6d45ea}
    .text{font-size:13px;line-height:1.45;color:#433b4f;margin:8px 0 12px}
    .btn{display:flex;align-items:center;justify-content:center;height:34px;border-radius:10px;background:#734ff0;color:#fff;font-size:12px;font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <div class="person">
        <div class="avatar"></div>
        <div><div class="name">Veronika</div><div class="role">tarot reader</div></div>
      </div>
      <div class="text">The main goal of my work is to help find answers to tormenting questions, understand and love yourself and the world.</div>
      <a class="btn" href="#">Start chat</a>
    </div>
  </div>
</body>
</html>
