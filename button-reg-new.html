<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Button Reg — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:"Manrope",sans-serif;background:#f3f0f8}
    .frame{width:min(335px,100vw);height:180px;margin:0 auto;background:linear-gradient(180deg,#f6f3fb 0%,#ece6f8 100%);display:flex;align-items:center;justify-content:center}
    .btn{display:inline-flex;align-items:center;justify-content:center;height:52px;padding:0 28px;border-radius:16px;background:#734ff0;color:#fff;font-size:20px;font-weight:700;letter-spacing:-.2px;box-shadow:0 12px 28px rgba(115,79,240,.24);text-decoration:none}
    .btn:hover{background:#6644df}
  </style>
</head>
<body>
  <div class="frame">
    <a class="btn" href="#">Continue</a>
  </div>
</body>
</html>
