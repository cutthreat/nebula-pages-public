<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cookies — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:"Manrope",sans-serif;background:#f3f0f8}
    .frame{width:min(1280px,100vw);height:855px;margin:0 auto;background:linear-gradient(180deg,#f6f3fb 0%,#ece6f8 100%);position:relative;overflow:hidden}
    .bg{position:absolute;inset:0;background:linear-gradient(135deg,#fefcff 0%,#f2ebff 100%)}
    .cookies{position:absolute;left:40px;right:40px;bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:12px 16px;border-radius:14px;background:#7a53ea;color:#fff;box-shadow:0 14px 30px rgba(122,83,234,.22)}
    .cookies__text{font-size:13px;line-height:1.5;max-width:880px}
    .cookies__actions{display:flex;gap:8px;flex:0 0 auto}
    .btn{display:inline-flex;align-items:center;justify-content:center;height:28px;padding:0 12px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none}
    .btn--primary{background:#fff;color:#6d45ea}
    .btn--ghost{border:1px solid rgba(255,255,255,.34);color:#fff}
    .hero{position:absolute;inset:88px 40px 112px;border-radius:26px;background:linear-gradient(180deg,#fff 0%,#f4ecff 100%);box-shadow:0 20px 48px rgba(84,54,169,.12)}
    @media (max-width:1200px){.frame{height:740px}.cookies{left:24px;right:24px}.hero{inset:78px 24px 94px}}
    @media (max-width:960px){.frame{height:740px}.cookies{flex-direction:column;align-items:flex-start}.cookies__actions{width:100%}.btn{flex:1}}
    @media (max-width:640px){.frame{height:740px}.cookies{left:16px;right:16px;bottom:16px}}
    @media (max-width:480px){.frame{height:740px}.cookies__text{font-size:12px}}
    @media (max-width:320px){.frame{height:740px}.cookies{padding:10px 12px}}
  </style>
</head>
<body>
  <div class="frame">
    <div class="bg"></div>
    <div class="hero"></div>
    <div class="cookies">
      <div class="cookies__text">Cookies help us personalize your experience on our site, provide social media features, and analyze our traffic.</div>
      <div class="cookies__actions">
        <a class="btn btn--primary" href="#">Accept</a>
        <a class="btn btn--ghost" href="#">Settings</a>
      </div>
    </div>
  </div>
</body>
</html>
