<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Review Card — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:"Manrope",sans-serif;background:#f3f0f8}
    .frame{width:min(350px,100vw);height:184px;margin:0 auto;background:linear-gradient(180deg,#f6f3fb 0%,#ece6f8 100%);display:flex;align-items:center;justify-content:center;padding:14px;box-sizing:border-box}
    .card{width:100%;height:100%;border-radius:18px;background:#7a53ea;color:#fff;padding:16px 14px;box-shadow:0 14px 28px rgba(122,83,234,.2)}
    .head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;font-size:12px}
    .name{font-weight:700}
    .stars{letter-spacing:1px}
    .body{font-size:13px;line-height:1.55}
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <div class="head"><span class="name">Kate</span><span class="stars">★★★★★</span></div>
      <div class="body">The psychic reading on Neuro was exactly what I needed. It helped me start from scratch with more trust.</div>
    </div>
  </div>
</body>
</html>
