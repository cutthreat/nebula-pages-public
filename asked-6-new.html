<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Asked 6 — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:"Manrope",sans-serif;background:linear-gradient(180deg,#f6f3fb 0%,#ece6f8 100%);color:#171717}
    .frame{width:min(288px,100vw);height:507px;margin:0 auto;display:flex;align-items:center;justify-content:center;padding:14px;box-sizing:border-box}
    .card{width:100%;height:100%;border-radius:20px;background:#fff;border:1px solid rgba(115,79,240,.12);box-shadow:0 14px 30px rgba(86,57,175,.08);padding:18px;box-sizing:border-box}
    .badge{display:inline-flex;padding:7px 10px;border-radius:999px;background:rgba(115,79,240,.08);color:#6d45ea;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
    .title{margin:0 0 10px;font-size:22px;line-height:1.05;color:#171717}
    .text{margin:0;color:#433b4f;font-size:13px;line-height:1.55}
    .box{margin-top:16px;padding:14px;border-radius:16px;background:#f4f0ff;border:1px solid rgba(115,79,240,.12)}
    .box h2{margin:0 0 8px;font-size:16px;color:#6d45ea}
    .box p{margin:0;font-size:12px;line-height:1.5;color:#433b4f}
    .footer{margin-top:14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .btn{display:inline-flex;align-items:center;justify-content:center;height:32px;padding:0 12px;border-radius:10px;background:#734ff0;color:#fff;text-decoration:none;font-size:12px;font-weight:700}
    .hint{font-size:11px;color:#7d6f97}
  </style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <span class="badge">ASKED 6</span>
      <h1 class="title">A few more questions</h1>
      <p class="text">This compact state is used when the flow needs one more input step or a short follow-up before the user continues.</p>
      <div class="box">
        <h2>Question</h2>
        <p>Do you want to ask about love, work, or a specific situation?</p>
      </div>
      <div class="footer">
        <span class="hint">Used in onboarding / follow-up flows</span>
        <a class="btn" href="#">Next</a>
      </div>
    </div>
  </div>
</body>
</html>
