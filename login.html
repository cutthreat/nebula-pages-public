<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in - Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth-login.css?v=20260331-login-pass-1" />
</head>
<body>
  <main class="login-stage" aria-label="Log in">
    <div class="login-frame">
      <div class="login-menu" aria-label="Top navigation">
        <button class="login-burger" type="button" tabindex="-1" aria-hidden="true"></button>
        <a class="login-brand" href="home.html" aria-label="Home">
          <img src="img/login-brand-figma.png" alt="NEURO" />
        </a>
        <div class="login-menu-right">
          <a class="login-lang" href="signup-step-1.html">Eng ▾</a>
          <a class="login-signup" href="signup-step-1.html">Sign up →</a>
          <button class="login-toggle" type="button" tabindex="-1" aria-hidden="true">
            <img src="img/login-toggle-icon.svg" alt="" />
          </button>
        </div>
        <button class="login-mobile-toggle" type="button" tabindex="-1" aria-hidden="true">
          <img src="img/login-toggle-icon.svg" alt="" />
        </button>
      </div>

      <div class="login-hero" aria-hidden="true">
        <img src="img/login-left-figma.png" alt="" />
      </div>

      <section class="login-card-wrap" aria-label="Log in form">
        <div class="login-card">
          <form class="login-panel" action="home.html" method="get">
            <h1 class="login-title">Log In</h1>
            <p class="login-social-title">Log in with</p>

            <div class="login-social-row" aria-label="Social sign in">
              <button class="login-social" type="button" aria-label="Log in with Google">
                <img src="img/login-google-figma.png" alt="" />
              </button>
              <button class="login-social" type="button" aria-label="Log in with Facebook">
                <img src="img/login-facebook-figma.png" alt="" />
              </button>
            </div>

            <div class="login-divider" aria-hidden="true"></div>

            <div class="login-fields">
              <input class="login-field" type="email" placeholder="Your email" aria-label="Your email" />
              <input class="login-field" type="password" placeholder="Your password" aria-label="Your password" />
              <a class="login-forgot" href="auth-forgot-new.html">Forgot password?</a>
              <button class="login-submit" type="submit">Log in</button>
              <p class="login-legal">
                By logging in, you agree to our <a href="https://asknebula.com/app/terms" target="_blank" rel="noopener">Terms of service</a><br />
                and <a href="https://asknebula.com/app/privacy" target="_blank" rel="noopener">Privacy Policy</a>
              </p>
            </div>
          </form>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
