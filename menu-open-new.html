<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menu Open — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:"Manrope",sans-serif;background:#f3f0f8}
    .frame{width:min(960px,100vw);height:740px;margin:0 auto;background:linear-gradient(180deg,#f6f3fb 0%,#ece6f8 100%);position:relative;overflow:hidden}
    .menu{position:absolute;inset:0;background:rgba(32,17,64,.76);display:grid;grid-template-columns:340px 1fr}
    .menu__panel{background:linear-gradient(180deg,#2c184d 0%,#3c255d 100%);color:#fff;padding:18px 18px 14px}
    .menu__top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .menu__logo{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:800;letter-spacing:.08em}
    .menu__dot{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#c8adff,#7a58ff 74%)}
    .menu__close{width:20px;height:20px;border:0;background:transparent;position:relative}
    .menu__close:before,.menu__close:after{content:"";position:absolute;left:9px;top:0;width:1px;height:20px;background:#fff}
    .menu__close:before{transform:rotate(45deg)}
    .menu__close:after{transform:rotate(-45deg)}
    .menu__list{list-style:none;margin:0;padding:0}
    .menu__item{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:18px;display:flex;justify-content:space-between;gap:10px}
    .menu__content{padding:26px 28px;color:#fff}
    .menu__title{font-size:40px;line-height:1.02;margin:8px 0 12px;max-width:320px;letter-spacing:-.04em}
    .menu__hero{position:absolute;right:34px;top:58px;width:328px;height:376px;border-radius:26px;background:linear-gradient(180deg,#cab8ff 0%,#8e68ff 100%);box-shadow:0 22px 44px rgba(50,22,112,.22)}
    .menu__hero::after{content:"";position:absolute;inset:18px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.26),rgba(255,255,255,0));}
    .menu__footer{position:absolute;left:18px;right:18px;bottom:14px;display:flex;align-items:center;justify-content:space-between;color:#fff;font-size:12px}
    .menu__footer .pill{padding:6px 10px;border:1px solid rgba(255,255,255,.28);border-radius:999px}
    @media (max-width:960px){.frame{width:960px;height:740px}.menu{grid-template-columns:300px 1fr}.menu__title{font-size:36px}.menu__hero{right:18px;width:300px}}
    @media (max-width:640px){.frame{width:640px;height:740px}.menu{grid-template-columns:1fr}.menu__hero{display:none}.menu__panel{height:100%}.menu__content{padding:20px}.menu__title{font-size:28px}}
    @media (max-width:480px){.frame{width:480px;height:740px}.menu__item{font-size:16px}}
    @media (max-width:320px){.frame{width:320px;height:740px}.menu__title{font-size:24px}}
  </style>
</head>
<body>
  <div class="frame">
    <div class="menu">
      <div class="menu__panel">
        <div class="menu__top">
          <div class="menu__logo"><span class="menu__dot"></span><span>NEURO</span></div>
          <button class="menu__close" aria-label="Close menu"></button>
        </div>
        <div class="menu__content">
          <div class="menu__title">Psychic Reading</div>
          <ul class="menu__list">
            <li class="menu__item"><span>Psychic Reading</span><span>›</span></li>
            <li class="menu__item"><span>Tarot Reading</span><span>›</span></li>
            <li class="menu__item"><span>Astrology Reading</span><span>›</span></li>
            <li class="menu__item"><span>Aura Reading</span><span>›</span></li>
            <li class="menu__item"><span>Numerology Reading</span><span>›</span></li>
            <li class="menu__item"><span>Palm Reading</span><span>›</span></li>
            <li class="menu__item"><span>Phone Psychic Reading</span><span>›</span></li>
            <li class="menu__item"><span>Email Psychic Reading</span><span>›</span></li>
          </ul>
        </div>
        <div class="menu__footer"><span class="pill">Sign up</span><span>Eng</span><span class="pill">Try now</span></div>
      </div>
      <div class="menu__hero"></div>
    </div>
  </div>
</body>
</html>
