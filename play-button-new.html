<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Play Button — Neuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:"Manrope",sans-serif;background:#f3f0f8}
    .frame{width:min(120px,100vw);height:220px;margin:0 auto;background:linear-gradient(180deg,#f6f3fb 0%,#ece6f8 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
    .play{width:38px;height:38px;border:0;border-radius:50%;background:#734ff0;box-shadow:0 12px 24px rgba(115,79,240,.24);position:relative}
    .play:before{content:"";position:absolute;left:14px;top:11px;border-left:12px solid #fff;border-top:8px solid transparent;border-bottom:8px solid transparent}
    .play:hover{background:#6644df}
    .play--light{background:#fff}
    .play--light:before{border-left-color:#734ff0}
  </style>
</head>
<body>
  <div class="frame">
    <button class="play" aria-label="Play"></button>
    <button class="play play--light" aria-label="Play"></button>
  </div>
</body>
</html>
