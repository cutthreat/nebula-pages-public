<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create an account — Step 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="figma-auth.css?v=20260503-signup-create-social-lineage" />
</head>
<body class="na-auth-page na-auth-page--create">
  <main class="na-auth-stage" aria-label="Create account step 1" data-figma-id="366:1166">
    <div class="na-auth-bg-layer na-auth-bg-layer--root" data-figma-id="366:1167" data-figma-image-ref="fd5c43707cda07281ef1a450b0950062854e60cb"></div>
    <div class="na-auth-bg-layer na-auth-bg-layer--silhouette" data-figma-id="366:1168" data-figma-image-ref="9fd63162d3194671f0a28062c463a5de32f38154"></div>
    <div class="na-auth-page__shell">
      <button class="na-auth-burger" type="button" tabindex="-1" aria-hidden="true"></button>
      <a class="na-auth-page__brand" href="home.html" aria-label="Home"><img src="img/logo-white.png" alt="NEURO" data-figma-image-ref="4ecae954384fd00b714cbf1b5fdca2c339f35a16"></a>
      <div class="na-auth-page__links">
        <span class="na-auth-page__lang"><span class="na-auth-page__lang-text">Eng</span><span class="na-auth-page__fallback">▾</span><img class="na-auth-page__chevron" src="img/auth-signup-step1-320-lang-chevron-figma.png" alt="" aria-hidden="true"></span>
        <a href="login.html"><span class="na-auth-page__login-text">Log in</span><span class="na-auth-page__fallback">→</span><img class="na-auth-page__login-arrow" src="img/auth-signup-step1-320-login-arrow-figma.png" alt="" aria-hidden="true"></a>
      </div>
      <button class="na-auth-mobile-toggle" type="button" tabindex="-1" aria-hidden="true">
        <img src="img/login-toggle-icon.svg" alt="" />
      </button>

      <aside class="na-auth-page__side"></aside>
      <section class="na-auth-page__panel" data-figma-id="366:1184" data-figma-image-ref="fd5c43707cda07281ef1a450b0950062854e60cb">
        <form class="na-auth-form" action="signup-step-2.html" method="get">
          <h1 class="na-auth-form__title">Create an account</h1>
          <p class="na-auth-form__subtitle">Lets us know a little about yourself</p>

          <div class="na-auth-field-wrap">
            <input class="na-auth-field" type="text" placeholder="Enter your name">
          </div>

          <div class="na-auth-pills">
            <label class="na-auth-pill is-active"><input type="radio" checked name="gender"><span class="na-auth-pill__dot"></span><span class="na-auth-pill__label">Woman</span></label>
            <label class="na-auth-pill"><input type="radio" name="gender"><span class="na-auth-pill__dot"></span><span class="na-auth-pill__label">Man</span></label>
          </div>

          <div class="na-auth-row na-auth-row--triple">
            <div class="na-auth-select-wrap"><select class="na-auth-select"><option>1</option></select></div>
            <div class="na-auth-select-wrap"><select class="na-auth-select"><option>Jan</option></select></div>
            <div class="na-auth-select-wrap"><select class="na-auth-select"><option>1990</option></select></div>
          </div>

          <button class="na-auth-btn" type="submit"><span class="na-auth-btn__text">Next step</span><span class="na-auth-page__fallback">→</span><img class="na-auth-btn__arrow" src="img/auth-signup-step1-320-login-arrow-figma.png" alt="" aria-hidden="true"></button>

          <div class="na-auth-divider"><span>or sing up with</span></div>
          <div class="na-auth-social">
            <a class="na-auth-social-btn na-auth-social-btn--google" href="signup-step-2.html" aria-label="Sign up with Google" data-figma-id="578:6393">
              <img src="img/auth-create-google-figma.png" alt="" aria-hidden="true" data-figma-id="I578:6393;572:6349" data-figma-image-ref="d2710407115e963ce3fd1e2d440eb97a0f42be4b" data-node-320-src="img/auth-signup-step1-320-google-node-figma.png">
            </a>
            <a class="na-auth-social-btn na-auth-social-btn--facebook" href="signup-step-2.html" aria-label="Sign up with Facebook" data-figma-id="578:6394">
              <img src="img/auth-create-facebook-figma.png" alt="" aria-hidden="true" data-figma-id="I578:6394;572:6349" data-figma-image-ref="870dac8f9983de95d96440d75160f8bc0ba50c94" data-node-320-src="img/auth-signup-step1-320-facebook-node-figma.png">
            </a>
          </div>
        </form>
      </section>
      <aside class="na-auth-page__side na-auth-page__side--right"></aside>
    </div>
  </main>
</body>
</html>
