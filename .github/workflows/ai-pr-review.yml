name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check API key presence
        id: keycheck
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report inactive AI lane
        if: steps.keycheck.outputs.skip == 'true'
        shell: bash
        run: |
          {
            echo "## AI PR Review"
            echo
            echo "Advisory lane is configured but inactive."
            echo
            echo "Reason: \`OPENAI_API_KEY\` is not configured in repository secrets."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pre-fetch PR refs
        if: steps.keycheck.outputs.skip == 'false' && github.event_name == 'pull_request'
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$PR_BASE_REF" "+refs/pull/$PR_NUMBER/head"

      - name: Build prompt file
        if: steps.keycheck.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f ".github/ai-review/prompt.md" ]; then
            echo "::error::Missing .github/ai-review/prompt.md"
            exit 1
          fi
          cp .github/ai-review/prompt.md codex-prompt.txt
          {
            echo
            echo "Pull request context:"
            echo "Repository: ${{ github.repository }}"
            echo "Event: ${{ github.event_name }}"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "PR number: #${{ github.event.pull_request.number }}"
              echo "Title: ${{ github.event.pull_request.title }}"
              echo "Body:"
              echo "${{ github.event.pull_request.body }}"
              echo
              echo "Review only the changes introduced by this PR."
              echo "Use these commands for context:"
              echo "git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
              echo "git diff --unified=3 ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}"
            else
              echo "Review the merge_group content only."
            fi
          } >> codex-prompt.txt

      - name: Run Codex review
        id: run_codex
        if: steps.keycheck.outputs.skip == 'false'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: codex-prompt.txt
          model: gpt-5.4-mini
          effort: low
          sandbox: read-only
          safety-strategy: drop-sudo

  post-feedback:
    runs-on: ubuntu-latest
    needs: ai-review
    if: github.event_name == 'pull_request' && needs.ai-review.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Publish advisory summary
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.ai-review.outputs.final_message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.CODEX_FINAL_MESSAGE
            });
